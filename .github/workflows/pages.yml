# ============================================================
# GitHub Pages — https://sitotanc.it (dominio custom, root)
# Pubblica il sito a ogni push su main. Il dominio è impostato
# in Settings → Pages; il file CNAME viene incluso nel deploy.
# Requisiti una tantum: Source = "GitHub Actions" e DNS del
# dominio puntato ai server Pages di GitHub.
# ============================================================

name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Prerequisito (una tantum, manuale): Settings → Pages →
      # Build and deployment → Source: "GitHub Actions".
      - uses: actions/configure-pages@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          DEPLOY_SITE: https://sitotanc.it

      # Mantiene il dominio custom associato al deploy
      - run: cp CNAME dist/CNAME

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
