# ============================================================
# GitHub Pages — https://emanuele-projects.github.io/progettotanc/
# Anteprima pubblicata a ogni push su main (project pages, base
# /progettotanc). Requisito una tantum: Settings → Pages →
# Build and deployment → Source: "GitHub Actions".
# Per tornare a un dominio custom in root: reimpostare DEPLOY_SITE,
# togliere DEPLOY_BASE e aggiungere il CNAME.
# ============================================================

name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Prerequisito (una tantum, manuale): Settings → Pages →
      # Build and deployment → Source: "GitHub Actions".
      - uses: actions/configure-pages@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          DEPLOY_SITE: https://emanuele-projects.github.io
          DEPLOY_BASE: /progettotanc

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
